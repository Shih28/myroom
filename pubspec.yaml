name: myroom
description: "MyRoom — a personal productivity app (Flutter + Firebase)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

# NOTE: The legacy SQLite dependencies (sqflite*, path_provider) are kept during
# Phase 0 only so the not-yet-deleted demo code keeps compiling. Phase 1 deletes
# the SQLite layer and removes them.
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # ── Firebase (semi-production backend) ─────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.4
  firebase_app_check: ^0.3.1+5
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # ── State / routing / DI ───────────────────────────────────────────────────
  go_router: ^14.6.2
  provider: ^6.1.2

  # ── Utilities ──────────────────────────────────────────────────────────────
  crypto: ^3.0.6
  flutter_timezone: ^3.0.1   # device IANA tz → settings/app.tz patch (Auth.md §3)

  # ── UI / media (retained) ──────────────────────────────────────────────────
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.13
  url_launcher: ^6.3.1
  file_picker: ^11.0.2
  record: ^6.0.0
  permission_handler: ^12.0.1
  pdfrx: ^2.2.24
  http: ^1.2.2

  # ── Legacy SQLite (Phase 0 only — removed in Phase 1) ──────────────────────
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
